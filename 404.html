<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Marco Pereira da Silva</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        align-content: center;
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
        background:
          radial-gradient(circle at top left, rgba(214, 166, 93, 0.12), transparent 32rem),
          linear-gradient(145deg, #10101d 0%, #151424 46%, #10101c 100%);
        color: #f4f0ea;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 42rem);
        margin: 0 auto;
      }

      .eyebrow {
        margin: 0;
        color: #f0c47a;
        font-size: 0.94rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.6rem 0 0.8rem;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 1;
      }

      p:not(.eyebrow) {
        max-width: 34rem;
        margin: 0;
        color: #b8b1ad;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.8rem;
        padding: 0 1.2rem;
        border: 1px solid rgba(216, 165, 88, 0.38);
        color: #f4f0ea;
        font-weight: 800;
        text-decoration: none;
      }

      a:first-child {
        background: #d6a65d;
        color: #1a1924;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Page Not Found</p>
      <h1>This page does not exist.</h1>
      <p>The link may be broken, or the address may have been typed incorrectly.</p>
      <div class="actions">
        <a href="/eportfolio/">Back Home</a>
        <a href="/eportfolio/#contact">Contact</a>
      </div>
    </main>
  </body>
</html>
